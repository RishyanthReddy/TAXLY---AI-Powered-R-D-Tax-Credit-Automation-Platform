[pytest]
# Test discovery settings
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Minimum version requirement
minversion = 7.0

# Command line options
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers - fail on unknown markers
    --strict-markers
    # Strict config - fail on unknown config options
    --strict-config
    # Coverage reporting
    --cov=agents
    --cov=tools
    --cov=models
    --cov=utils
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Fail if coverage is below 80%
    --cov-fail-under=80
    # Show warnings
    -W default
    # Capture output (can be disabled with -s flag)
    --capture=no

# Test markers for categorization
markers =
    unit: Unit tests for individual components (fast, no external dependencies)
    integration: Integration tests for component interactions (may use mocks)
    e2e: End-to-end tests for complete workflows (slow, may use real APIs)
    slow: Tests that take significant time to run
    api: Tests that interact with external APIs
    rag: Tests for RAG system and knowledge base
    pdf: Tests for PDF generation functionality
    requires_env: Tests that require environment variables to be set

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Timeout settings for async tests (in seconds)
# Note: Requires pytest-timeout plugin to be installed
# Uncomment the lines below after installing: pip install pytest-timeout
# timeout = 300
# timeout_method = thread

# Console output options
console_output_style = progress

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ignore certain warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Add specific warnings to ignore as needed
    # error::UserWarning  # Uncomment to treat UserWarnings as errors

# Test collection ignore patterns
norecursedirs = 
    .git
    .pytest_cache
    venv
    __pycache__
    *.egg-info
    dist
    build
    htmlcov
    .vscode
    .kiro
    frontend
    knowledge_base
    logs
    outputs

# Doctest configuration (if using doctests)
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Pytest-cov configuration
[coverage:run]
source = agents,tools,models,utils
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*
    */examples/*
    test_*.py

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines =
    # Standard pragma
    pragma: no cover
    # Don't complain about missing debug-only code
    def __repr__
    def __str__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    # Don't complain about type checking blocks
    if typing.TYPE_CHECKING:

[coverage:html]
directory = htmlcov
